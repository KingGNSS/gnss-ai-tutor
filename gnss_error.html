<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI助教：定位漂移，误差从哪里来？</title>
  <style>
    :root{
      --blue:#1f5fbf;
      --blue-dark:#123f7a;
      --blue-light:#edf5ff;
      --border:#d8e3f3;
      --text:#1f2937;
      --muted:#667085;
      --shadow:0 12px 28px rgba(31,95,191,.12);
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:"Microsoft YaHei","PingFang SC","Noto Sans SC",Arial,sans-serif;
      background:linear-gradient(180deg,#ffffff 0%,#f3f8ff 100%);
      color:var(--text);
    }
    .page{
      min-height:100vh;
      padding:28px;
      display:flex;
      justify-content:center;
      align-items:center;
    }
    .slide{
      width:min(1280px,100%);
      min-height:720px;
      background:#fff;
      border:1px solid var(--border);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }
    .topbar{
      height:12px;
      background:linear-gradient(90deg,var(--blue-dark),var(--blue),#69b5ff);
    }
    .content{padding:32px 40px 36px;}
    .header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:22px;}
    h1{margin:0;font-size:36px;line-height:1.25;color:var(--blue-dark);}
    .subtitle{margin:10px 0 0;font-size:18px;color:var(--muted);line-height:1.6;}
    .badge{padding:10px 16px;border-radius:999px;background:var(--blue-light);border:1px solid #c9dcff;color:var(--blue-dark);font-weight:800;white-space:nowrap;}

    .layout{display:grid;grid-template-columns:360px 1fr;gap:24px;align-items:stretch;}
    .panel{background:#fff;border:1px solid var(--border);border-radius:18px;padding:22px;box-shadow:0 6px 18px rgba(31,95,191,.06);}
    .panel h2{margin:0 0 14px;font-size:24px;color:var(--blue-dark);}
    .scene-list{display:grid;gap:12px;margin-top:8px;}
    .scene-btn{
      width:100%;text-align:left;background:#fff;border:2px solid #d8e3f5;border-radius:14px;padding:16px 16px;cursor:pointer;
      font-size:18px;line-height:1.55;transition:.18s ease;display:flex;gap:12px;align-items:flex-start;
    }
    .scene-btn:hover{border-color:var(--blue);background:#f7fbff;transform:translateY(-1px);}
    .scene-btn.active{border-color:var(--blue);background:#eef6ff;}
    .scene-num{
      width:30px;height:30px;border-radius:50%;background:var(--blue-light);color:var(--blue-dark);display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:15px;flex:0 0 auto;
    }
    .scene-meta b{display:block;color:var(--blue-dark);font-size:18px;margin-bottom:3px;}
    .scene-meta span{font-size:15px;color:var(--muted);}

    .display-card{display:grid;grid-template-rows:auto 1fr auto;gap:16px;height:100%;}
    .display-head{display:flex;justify-content:space-between;align-items:center;gap:12px;}
    .display-head h2{margin:0;font-size:26px;color:var(--blue-dark);}
    .tag{padding:8px 12px;border-radius:999px;background:var(--blue-light);border:1px solid #c9dcff;color:var(--blue-dark);font-weight:700;font-size:14px;}
    .visual-wrap{
      border-radius:18px;border:1px solid #d8e8ff;background:linear-gradient(180deg,#f9fbff,#ffffff);padding:12px;display:flex;align-items:center;justify-content:center;min-height:360px;
    }
    .visual-wrap svg{width:100%;max-width:720px;height:auto;display:block;}
    .phenomenon{
      background:#f8fbff;border:1px solid #d8e8ff;border-radius:18px;padding:18px 20px;
    }
    .phenomenon h3{margin:0 0 10px;font-size:22px;color:var(--blue-dark);}
    .phenomenon ul{margin:0;padding-left:22px;font-size:18px;line-height:1.7;}
    .phenomenon li{margin:4px 0;}
    .tip{margin-top:8px;font-size:14px;color:var(--muted);}

    @media (max-width:960px){
      .page{padding:14px;align-items:flex-start;}
      .content{padding:24px 18px 26px;}
      .header{display:block;}
      .badge{display:inline-block;margin-top:14px;}
      h1{font-size:30px;}
      .layout{grid-template-columns:1fr;}
      .visual-wrap{min-height:260px;}
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="slide">
      <div class="topbar"></div>
      <div class="content">
        <div class="header">
          <div>
            <h1>AI助教：定位漂移，误差从哪里来？</h1>
            <p class="subtitle">点击不同场景，查看对应的定位环境与定位现象可视化</p>
          </div>
          <div class="badge">四种典型场景互动</div>
        </div>

        <div class="layout">
          <div class="panel">
            <h2>场景选择</h2>
            <div class="scene-list">
              <button class="scene-btn active" data-scene="playground">
                <div class="scene-num">1</div>
                <div class="scene-meta"><b>开阔操场</b><span>卫星可见性好，环境开阔</span></div>
              </button>
              <button class="scene-btn" data-scene="urban">
                <div class="scene-num">2</div>
                <div class="scene-meta"><b>高楼街区</b><span>遮挡与反射明显</span></div>
              </button>
              <button class="scene-btn" data-scene="trees">
                <div class="scene-num">3</div>
                <div class="scene-meta"><b>树荫下</b><span>信号受树木遮挡衰减</span></div>
              </button>
              <button class="scene-btn" data-scene="indoor">
                <div class="scene-num">4</div>
                <div class="scene-meta"><b>室内窗边</b><span>可见卫星少，反射较强</span></div>
              </button>
            </div>
            <p class="tip">说明：点击左侧任一场景，右侧会展示该场景下的定位环境和典型定位现象。</p>
          </div>

          <div class="panel display-card">
            <div class="display-head">
              <h2 id="sceneTitle">开阔操场</h2>
              <div class="tag" id="sceneTag">定位表现：稳定</div>
            </div>
            <div class="visual-wrap" id="sceneVisual"></div>
            <div class="phenomenon">
              <h3>定位现象</h3>
              <ul id="sceneDesc"></ul>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const scenes = {
      playground: {

        tag: '定位表现：稳定',
        desc: [

        ],

        <svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" aria-label="开阔操场定位环境">

          <ellipse cx="380" cy="315" rx="180" ry="55" fill="#cfe9cc" stroke="#7cbf78" stroke-width="3"/>
          <text x="290" y="322" font-size="22" fill="#2f6b3a" font-weight="700">开阔操场</text>

          <g font-size="16" font-weight="700" fill="#123f7a">
            <g transform="translate(120 120)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星1</text></g>
            <g transform="translate(310 70)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星2</text></g>
            <g transform="translate(510 100)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星3</text></g>
            <g transform="translate(660 145)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星4</text></g>

            <circle cx="0" cy="77" r="4" fill="#fff"/>
          </g>

          <g stroke="#1f5fbf" stroke-width="3" stroke-dasharray="8 8" opacity="0.8">

            <line x1="310" y1="70" x2="378" y2="255"/>
            <line x1="510" y1="100" x2="378" y2="255"/>

          <circle cx="378" cy="255" r="8" fill="#e53935"/>

      },
      urban: {

        desc: [

          '建筑物反射引起多路径效应。',
          '定位点容易漂移、跳变，误差圈增大。'
        ],
        svg: `
        <svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" aria-label="高楼街区定位环境">
          <rect width="760" height="420" fill="#f7fbff"/>
          <rect width="760" height="220" fill="#e7f2ff"/>
          <rect y="220" width="760" height="200" fill="#dde3ea"/>
          <rect x="0" y="245" width="760" height="110" fill="#7a8897"/>
          <line x1="40" y1="300" x2="720" y2="300" stroke="#fff" stroke-width="6" stroke-dasharray="20 18"/>

          <g fill="#6b7a8f">
            <rect x="40" y="80" width="130" height="165"/>

          </g>
          <g fill="#b8d5ff" opacity="0.7">
            <rect x="60" y="100" width="18" height="16"/><rect x="90" y="100" width="18" height="16"/><rect x="120" y="100" width="18" height="16"/>
            <rect x="60" y="128" width="18" height="16"/><rect x="90" y="128" width="18" height="16"/><rect x="120" y="128" width="18" height="16"/>
            <rect x="590" y="115" width="18" height="16"/><rect x="620" y="115" width="18" height="16"/>
            <rect x="590" y="145" width="18" height="16"/><rect x="620" y="145" width="18" height="16"/>
          </g>

          <g font-size="16" font-weight="700" fill="#123f7a">
            <g transform="translate(170 70)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星1</text></g>
            <g transform="translate(650 60)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星2</text></g>
            <g transform="translate(390 45)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2" opacity="0.45"/><text x="-16" y="6" opacity="0.45">卫星3</text></g>
          </g>

          <g transform="translate(380 230)">
            <rect x="-24" y="0" width="48" height="90" rx="10" fill="#1f2937"/>
            <rect x="-18" y="8" width="36" height="60" rx="7" fill="#edf5ff"/>
            <circle cx="0" cy="77" r="4" fill="#fff"/>
          </g>

          <g stroke="#1f5fbf" stroke-width="3" stroke-dasharray="8 8" opacity="0.75">
            <line x1="170" y1="70" x2="380" y2="230"/>
            <line x1="650" y1="60" x2="380" y2="230"/>
          </g>
          <polyline points="650,60 600,95 540,180 380,230" fill="none" stroke="#f29900" stroke-width="4" stroke-dasharray="10 8"/>
          <text x="505" y="115" font-size="16" fill="#d97706" font-weight="700">反射路径</text>

          <g fill="#d93025" opacity="0.95">
            <circle cx="360" cy="235" r="7"/>
            <circle cx="392" cy="250" r="7"/>
            <circle cx="342" cy="268" r="7"/>
            <circle cx="410" cy="275" r="7"/>
          </g>
          <ellipse cx="380" cy="255" rx="65" ry="42" fill="none" stroke="#d93025" stroke-width="3" stroke-dasharray="8 6" opacity="0.65"/>
          <text x="435" y="287" font-size="18" fill="#d93025" font-weight="700">漂移 / 跳变</text>
        </svg>`
      },
      trees: {
        title: '树荫下',
        tag: '定位表现：轻微漂移、不稳定',
        desc: [
          '树冠对GNSS信号产生遮挡和衰减。',
          '部分信号穿透树叶后质量下降。',
          '定位结果可能轻微漂移，稳定性下降。'
        ],
        svg: `
        <svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" aria-label="树荫下定位环境">
          <rect width="760" height="420" fill="#f7fbff"/>
          <rect width="760" height="235" fill="#dff1ff"/>
          <rect y="235" width="760" height="185" fill="#b7dfab"/>
          <rect y="298" width="760" height="122" fill="#94cf84"/>

          <g>
            <rect x="120" y="170" width="18" height="140" fill="#7b5130"/>
            <circle cx="129" cy="150" r="55" fill="#4ea34f"/>
            <circle cx="92" cy="168" r="42" fill="#5db35c"/>
            <circle cx="163" cy="168" r="40" fill="#61b860"/>

            <rect x="570" y="170" width="18" height="140" fill="#7b5130"/>
            <circle cx="579" cy="150" r="55" fill="#4ea34f"/>
            <circle cx="543" cy="168" r="42" fill="#5db35c"/>
            <circle cx="612" cy="168" r="40" fill="#61b860"/>
          </g>

          <g opacity="0.85" font-size="16" font-weight="700" fill="#123f7a">
            <g transform="translate(140 75)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2" opacity="0.55"/><text x="-16" y="6" opacity="0.65">卫星1</text></g>
            <g transform="translate(370 55)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星2</text></g>
            <g transform="translate(620 85)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2" opacity="0.55"/><text x="-16" y="6" opacity="0.65">卫星3</text></g>
          </g>

          <g transform="translate(380 250)">
            <rect x="-24" y="0" width="48" height="90" rx="10" fill="#1f2937"/>
            <rect x="-18" y="8" width="36" height="60" rx="7" fill="#edf5ff"/>
            <circle cx="0" cy="77" r="4" fill="#fff"/>
          </g>

          <g stroke="#1f5fbf" stroke-width="3" stroke-dasharray="8 8">
            <line x1="370" y1="55" x2="380" y2="250"/>
          </g>
          <g stroke="#1f5fbf" stroke-width="3" stroke-dasharray="8 8" opacity="0.35">
            <line x1="140" y1="75" x2="380" y2="250"/>
            <line x1="620" y1="85" x2="380" y2="250"/>
          </g>
          <g fill="#d93025">
            <circle cx="372" cy="247" r="7"/>
            <circle cx="394" cy="258" r="7"/>
            <circle cx="358" cy="270" r="7"/>
          </g>
          <ellipse cx="378" cy="258" rx="42" ry="28" fill="none" stroke="#d93025" stroke-width="3" stroke-dasharray="8 6" opacity="0.6"/>
          <text x="430" y="271" font-size="18" fill="#d93025" font-weight="700">轻微漂移</text>
        </svg>`
      },
      indoor: {
        title: '室内窗边',
        tag: '定位表现：跳变、误差大',
        desc: [
          '建筑内部遮挡严重，可见卫星数量少。',
          '窗边仍可能接收到较弱直达信号和较强反射信号。',
          '定位点容易跳变，误差明显增大，定位可用性下降。'
        ],
        svg: `
        <svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" aria-label="室内窗边定位环境">
          <rect width="760" height="420" fill="#f7fbff"/>
          <rect width="760" height="180" fill="#e4f2ff"/>
          <rect y="180" width="760" height="240" fill="#e9eef4"/>

          <rect x="120" y="80" width="480" height="270" fill="#f4f6f9" stroke="#7a8897" stroke-width="4"/>
          <rect x="420" y="110" width="120" height="120" fill="#dff1ff" stroke="#7a8897" stroke-width="4"/>
          <line x1="480" y1="110" x2="480" y2="230" stroke="#7a8897" stroke-width="4"/>
          <line x1="420" y1="170" x2="540" y2="170" stroke="#7a8897" stroke-width="4"/>
          <text x="185" y="138" font-size="22" fill="#5d6b7d" font-weight="700">室内</text>
          <text x="442" y="101" font-size="18" fill="#123f7a" font-weight="700">窗边</text>

          <g font-size="16" font-weight="700" fill="#123f7a">
            <g transform="translate(530 58)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2"/><text x="-16" y="6">卫星1</text></g>
            <g transform="translate(650 90)"><rect x="-28" y="-16" rx="12" width="56" height="32" fill="#fff" stroke="#bcd3f2" opacity="0.45"/><text x="-16" y="6" opacity="0.55">卫星2</text></g>
          </g>

          <g transform="translate(360 245)">
            <rect x="-24" y="0" width="48" height="90" rx="10" fill="#1f2937"/>
            <rect x="-18" y="8" width="36" height="60" rx="7" fill="#edf5ff"/>
            <circle cx="0" cy="77" r="4" fill="#fff"/>
          </g>

          <g stroke="#1f5fbf" stroke-width="3" stroke-dasharray="8 8" opacity="0.55">
            <line x1="530" y1="58" x2="480" y2="140"/>
            <line x1="480" y1="140" x2="360" y2="245"/>
          </g>
          <polyline points="650,90 540,170 420,170 360,245" fill="none" stroke="#f29900" stroke-width="4" stroke-dasharray="10 8"/>
          <text x="565" y="155" font-size="16" fill="#d97706" font-weight="700">反射增强</text>

          <g fill="#d93025">
            <circle cx="338" cy="230" r="7"/>
            <circle cx="385" cy="250" r="7"/>
            <circle cx="350" cy="280" r="7"/>
            <circle cx="398" cy="290" r="7"/>
          </g>
          <ellipse cx="368" cy="260" rx="68" ry="45" fill="none" stroke="#d93025" stroke-width="3" stroke-dasharray="8 6" opacity="0.6"/>
          <text x="440" y="286" font-size="18" fill="#d93025" font-weight="700">跳变 / 误差大</text>
        </svg>`
      }
    };

    const titleEl = document.getElementById('sceneTitle');
    const tagEl = document.getElementById('sceneTag');
    const visualEl = document.getElementById('sceneVisual');
    const descEl = document.getElementById('sceneDesc');
    const buttons = document.querySelectorAll('.scene-btn');

    function renderScene(key){
      const s = scenes[key];
      titleEl.textContent = s.title;
      tagEl.textContent = s.tag;
      visualEl.innerHTML = s.svg;
      descEl.innerHTML = s.desc.map(item => `<li>${item}</li>`).join('');
      buttons.forEach(btn => btn.classList.toggle('active', btn.dataset.scene === key));
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => renderScene(btn.dataset.scene));
    });

    renderScene('playground');
  </script>
</body>
</html>
